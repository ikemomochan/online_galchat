<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Chat with Lilymoo</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
  <script defer src="{{ url_for('static', filename='script.js') }}"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <header class="app-header">
    <div class="header-left">
      <div class="avatar-circle">
        <img id="header-gal-img" src="/static/gyaru_default.png" alt="">
      </div>
      <div class="gal-info">
        <span class="gal-name">Lilymoo</span>
        <!-- <span id="timer-display" style="font-size:0.8rem; color:#d81b60; margin-left:8px;">残り 05:00</span> -->
      </div>
    </div>
    <button id="score-btn" class="score-badge">
      <span>GYARU-MIDX</span>
      <span id="header-score" class="score-value">--</span>
    </button>
  </header>

  <main id="chat-area" class="chat-container">
    <div class="bubble gal">
        Yo!💖<br>We’re boosting the mood today!
    </div>
  </main>

  <footer class="input-container">
    <form id="chat-form" class="input-box">
      <input id="message" type="text" autocomplete="off" placeholder="メッセージ..." />
      <button type="submit">Send</button>
    </form>
  </footer>

  <div id="stats-modal" class="modal-overlay hidden">
    <div class="modal-content">
      <button id="close-modal" class="close-btn">×</button>
      <h2 style="text-align:center; color:#d81b60;">GYARU-MIDX Analysis📈</h2>
      
      <div class="chart-wrapper">
        <canvas id="gm-chart"></canvas>
      </div>

      <div class="bottom-panel">
        <div class="panel-tabs" style="text-align:center; margin-top:12px;">
          <button id="tab-breakdown" class="panel-tab active">Breakdown</button>
          <button id="tab-trend" class="panel-tab">Trend</button>
        </div>

        <div id="panel-breakdown">
          <div class="details-wrapper">
            <h3 style="color:#d81b60;">Breakdown📋</h3>
            <div class="nav-row" style="text-align:center; margin-bottom:5px;">
                <button id="prev-detail">◀</button>
                <span id="detail-index">#--</span>
                <button id="next-detail">▶</button>
            </div>
            <table id="gyarumind-detail-table"></table>
          </div>
        </div>

        <div id="panel-trend" style="display:none;">
          <div class="metrics-wrapper" style="margin-top:12px;">
            <h3 style="color:#d81b60;">Metrics (click a tab)</h3>
            <div id="metric-tabs" class="metric-tabs" style="display:flex; gap:6px; flex-wrap:wrap; justify-content:center; margin:8px 0;"></div>
            <div id="metric-view" style="text-align:center;">
              <table id="metric-detail-table" style="margin:0 auto 8px auto;"></table>
              <div id="metric-average" style="font-weight:700; color:#c2185b; margin-bottom:6px;"></div>
            </div>
          </div>
          <div id="trend-message" class="trend-text" style="text-align:center; margin-top:10px; color:#c2185b;"></div>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
